name: Keep live content patch

# Auto-repairs a raw Claude Design export on every push to index.html so it
# behaves like the production site. Three idempotent fixes:
#   A. load posts/random/settings live from /content/ (not the baked snapshot)
#   B. remove the static "cptnkid" splash shown before the app mounts
#   C. render the meta bubbles on every film row (not just the first)
# Does nothing if the file is already correct, so it never loops.

on:
  push:
    branches: [main]
    paths:
      - index.html

permissions:
  contents: write

concurrency:
  group: patch-index-${{ github.ref }}
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Re-apply site patches
        run: |
          cat > /tmp/patch_index.py <<'PYEOF'
          import re, json, gzip, base64

          PATH = "index.html"
          html = open(PATH, encoding="utf-8").read()
          changed = False

          # FIX A: load posts/random/settings live from /content/ (not the baked snapshot)
          if "__live[path]" not in html:
              anchor = "if (!path) return path;"
              if html.count(anchor) == 1:
                  insert = (r'\n      var __live={\"data/posts.json\":\"/content/posts.json\",'
                            r'\"data/random.json\":\"/content/random.json\",'
                            r'\"data/settings.json\":\"/content/settings.json\"};'
                            r'\n      if (__live[path]) return __live[path]+\"?v=\"+Date.now();')
                  html = html.replace(anchor, anchor + insert, 1); changed = True
                  print("Applied: live-content patch")
              else:
                  print(f"::warning::live-content anchor x{html.count(anchor)} (expected 1) - skipped")
          else:
              print("live-content patch already present")

          # FIX B: remove the static 'cptnkid' thumbnail splash shown before React mounts
          m = re.search(r'\n  <div id="__bundler_thumbnail">.*?</div>\n', html, re.S)
          if m and "cptnkid" in m.group(0) and m.group(0).count("</div>") == 1:
              html = html[:m.start()] + "\n" + html[m.end():]; changed = True
              print("Applied: removed cptnkid splash")
          elif not m:
              print("cptnkid splash already absent")
          else:
              print("::warning::thumbnail splash shape unexpected - skipped")

          # FIX C: render meta bubbles on every film row (drop first-row-only gate)
          def get(tag):
              return re.search(r'(<script type="%s">)(.*?)(</script>)' % re.escape(tag), html, re.S)
          mm, tm = get("__bundler/manifest"), get("__bundler/template")
          if mm and tm:
              manifest = json.loads(mm.group(2)); tmpl = json.loads(tm.group(2))
              bm = re.search(r'text/babel" src="([0-9a-f-]{36})"', tmpl)
              if bm and bm.group(1) in manifest:
                  e = manifest[bm.group(1)]; raw = base64.b64decode(e["data"])
                  src = (gzip.decompress(raw) if e.get("compressed") else raw).decode("utf-8")
                  if "{isFirst && (" in src:
                      src = src.replace("{isFirst && (", "{true && (", 1)
                      nb = src.encode("utf-8")
                      if e.get("compressed"): nb = gzip.compress(nb, mtime=0)
                      e["data"] = base64.b64encode(nb).decode("ascii")
                      nmj = json.dumps(manifest, separators=(",", ":"))
                      if "</script>" in nmj:
                          print("::error::manifest reserialize unsafe - skipped bubbles fix")
                      else:
                          html = html[:mm.start()] + mm.group(1) + nmj + mm.group(3) + html[mm.end():]
                          changed = True; print("Applied: meta bubbles on all rows")
                  else:
                      print("meta-bubbles gate already absent")
              else:
                  print("::warning::babel blob not locatable - skipped bubbles fix")
          else:
              print("::warning::manifest/template not found - skipped bubbles fix")

          if changed:
              open(PATH, "w", encoding="utf-8").write(html); print("index.html updated.")
          else:
              print("No changes needed.")
          PYEOF
          python3 /tmp/patch_index.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- index.html; then
            echo "No changes to commit."
          else
            git config user.name  "bootleg-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Auto: re-apply site patches to index.html"
            git push
          fi
